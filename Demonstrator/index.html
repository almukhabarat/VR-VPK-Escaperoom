<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VPK - VR</title>
    <meta name="description" content="Reken theorie oefenen in VR" />
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/@c-frame/aframe-physics-system@4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>

    <script src="scenario-config.js" defer></script>
    <script src="constants.js" defer></script>
    <script src="scenario-functions.js" defer></script>
    <script src="game-management.js" defer></script>
    <script src="input.js" defer></script>
    <script src="whiteboard.js" defer></script>
    <script src="objects.js" defer></script>
    <script src="main.js" defer></script>
    <script src="checkpoint.js" defer></script>
    <script src="codeManager.js" defer></script>
      <script src="introduction.js" defer></script>
    
</head>


<body>
<a-scene physics="debug:false">
    <a-assets>
        <a-asset-item id="hallway" src="assets/hallway.glb"></a-asset-item>
        <a-asset-item id="hallway" src="assets/hallway.glb"></a-asset-item>
        <a-asset-item id="room-a-glb" src="assets/Kamer_A.glb"></a-asset-item>
        <a-asset-item id="room-b-glb" src="assets/Kamer_B.glb"></a-asset-item>
        <a-asset-item id="patient" src="assets/patient.glb"></a-asset-item>
        <a-asset-item id="iv-pole" src="assets/IV_pole.glb"></a-asset-item>
        <a-asset-item
        id="medication-cup"
        src="assets/medication_cup.glb"
        ></a-asset-item>
        <a-asset-item
        id="syringe-model"
        src="assets/syringe.glb"
        ></a-asset-item>
        <a-asset-item
        id="plunger-model"
        src="assets/plunger.glb"
        ></a-asset-item>
        <a-asset-item
        id="med-bottle-model"
        src="assets/bottle.glb"
        ></a-asset-item>
        <img id="city-backdrop" src="assets/outside_window.jpg"></img>
        <img id="arrow-btn-asset" src="assets/arrow_button.png"></img>
        <img id="ok-btn-asset" src="assets/ok_button.png"></img>
        <img id="icon-calc" src="assets/calculate.svg"></img>
        <img id="icon-trash" src="assets/clear.svg"></img>
        <img id="icon-load" src="assets/reload.png"></img>
        <img id="question-mark" src="assets/question_mark.png"></img>
        <canvas id="drawing-canvas" width="512" height="306"></canvas>
        <audio
          id="ambience-sound"
          src="assets/ambience.mp3"
          preload="auto"
        ></audio>
        <audio id="cough-sfx" src="assets/coughing.ogg" preload="auto"></audio>
        <audio
          id="success-sfx"
          src="assets/p_answer.ogg"
          preload="auto"
        ></audio>
    </a-assets>


    <a-entity gltf-model="#hallway" position="0 0 0" rotation="0 0 0"></a-entity>

    <!-- Checkpoints -->
    <a-entity id="checkpoint-container">
        <a-cylinder class="checkpoint" position="-1.25 -0.2 -6" mixin="checkpoint-mixin" scale="0.5 0.5 0.5" checkpoint="y: 0.05" color="#bbb"></a-cylinder>
        <a-cylinder class="checkpoint" position="1 -0.2 -12.25" mixin="checkpoint-mixin" scale="0.5 0.5 0.5" checkpoint="y: 0.05" color="#bbb"></a-cylinder>
        <a-cylinder class="checkpoint" position="-0.2 -0.2 -20" mixin="checkpoint-mixin" scale="0.5 0.5 0.5" checkpoint="y: 0.05" color="#bbb"></a-cylinder>
    </a-entity>

    <a-box position="-1.25 1.6 -6" door-trigger="target: #enter-prompt-1" visible="false"></a-box>
    <a-box position="1 1.6 -12.25" door-trigger="target: #enter-prompt-2" visible="false"></a-box>
    <a-box position="-0.2 1.6 -20" keypad-trigger="target:#keypad-trigger" visible="false"></a-box>

    <a-entity id="rig" position="0 0 0" checkpoint-controls="mode: animate" rig-movement>
        <a-entity camera position="0 1.6 0">
            <a-entity cursor="fuse: true; rayOrigin: mouse"
                      raycaster="objects: .checkpoint, .interactable"
                      position="0 0 -1">
            </a-entity>
        </a-entity>

        <a-entity id="introUI" position="0 1.6 -0.5" face-user>

            <!-- Background -->
            <a-plane width="1" height="0.6" position ="0 -0.05 0"opacity="0.4" color="#222"></a-plane>

            <!-- Tabs -->
            <a-plane id="tab1" class="interactable " position="-0.3 0.3 0.02"
                     width="0.15" height="0.075" color="#00d4ff">
                <a-text value="Intro" align="center" width="0.5"></a-text>
            </a-plane>

            <a-plane id="tab2" class="interactable active-tab" position="0 0.3 0.02"
                     width="0.15" height="0.075" color="#000">
                <a-text value="Uitleg" align="center" width="0.5"></a-text>
            </a-plane>

            <a-plane id="tab3" class="interactable active-tab" position="0.3 0.3 0.02"
                     width="0.15" height="0.075" color="#000">
                <a-text value="Help" align="center" width="0.5"></a-text>
            </a-plane>

            <!-- Close button -->
            <a-plane id="closeBtn" class="interactable close-button" position="0.45 0.3 0.02"
                     width="0.1" height="0.075" color="#ff4444">
                <a-text value="X" align="center" width="0.5"></a-text>
            </a-plane>

            <!-- Title -->
            <a-text id="titleText"
                    value="Introductie"
                    align="center"
                    position="0 0.2 0.01"
                    width="0.8"
                    color="#00d4ff">
            </a-text>

            <!-- Dynamic content -->
            <a-text id="contentText"
                    value=""
                    align="center"
                    position="0 -0.05 0.01"
                    width="0.7">
            </a-text>

        </a-entity>


        <!-- Door 1 popup -->
        <a-entity
                class="door-menu"
                id="enter-prompt-1"
                position="-0.5 1.6 0"
                rotation="0 90 0"
                visible="false"
        >
            <a-plane width="1" height="0.5" opacity="0.4" color="#222"></a-plane>

            <a-text
                    value="Dhr. Yassin El Amrani"
                    align="center"
                    position="0 0.2 0.01"
                    width="0.8"
                    color="#00d4ff"
                    font="mozillavr"
            ></a-text>
            <a-text
                    value="Oefen het berekenen van medicatiedoseringen en verdunningen bij een patient met longontsteking. Let op antibiotica, slijmoplossers en pijnmedicatie.

                    Focus: Berekeningen van mg, g, ml, en concentraties"
                    align="center"
                    position="0 0.05 0.01"
                    width="0.7"
            ></a-text>

            <a-entity
                    class="door-button"
                    geometry="primitive: plane; width: 0.4; height: 0.1"
                    material="color: #00d4ff"
                    position="0 -0.15 0.02"
                    onclick="GameManager.launchSimulation(0)"
            >
                <a-text value="Start" align="center" width="1"></a-text>
            </a-entity>
            <a-entity class="loading-indicator" position="0 0 0.03" visible="false">
                <a-text
                        value="Kamer laden..."
                        align="center"
                        width="4"
                        color="black"
                ></a-text>
            </a-entity>
        </a-entity>

        <!-- Door 2 popup -->
        <a-entity
                class="door-menu"
                id="enter-prompt-2"
                position="0.5 1.6 0"
                rotation="0 270 0"
                visible="false"
        >
            <a-plane id="door-menu" width="1" height="0.5" opacity="0.4" color="#222"></a-plane>

            <a-text
                    value="Dhr. Emre Demir (IC)"
                    align="center"
                    position="0 0.2 0.01"
                    width="0.8"
                    color="#00d4ff"
                    font="mozillavr"
            ></a-text>
            <a-text
                    value="Oefen infuusberekeningen, zuurstoftoediening en druppelsnelheid bij een IC-patiënt met ademhalingsproblemen.

            Focus: Infuusberekeningen, zuurstofverbruik, medicatie via infuus, en pompinstellingen."
                    align="center"
                    position="0 0.05 0.01"
                    width="0.7"
            ></a-text>

            <a-entity
                    class="door-button"
                    geometry="primitive: plane; width: 0.4; height: 0.1"
                    material="color: #00d4ff"
                    position="0 -0.15 0.02"
                    onclick="GameManager.launchSimulation(1)"
            >

                <a-text value="Start" align="center" width="1"></a-text>
            </a-entity>
            <a-entity class="loading-indicator" position="0 0 0.03" visible="false">
                <a-text
                        value="Kamer laden..."
                        align="center"
                        width="4"
                        color="black"
                ></a-text>
            </a-entity>
        </a-entity>

        <a-box id="keypad-trigger"
               position="0.9475 1.68 -1.8"
               scale=" 0.25 0.35 0.3"
               visible="false"
               opacity="0.3" color="#00d4ff"></a-box>
        <a-entity id="keypad" position="-0.05 1.8    -1" visible="false">
            <a-plane width="0.5" height="0.1" position="0 0 -0.5" color="#111"></a-plane>

            <a-text
                    value="Vul in code"
                    align="center"
                    position="0 0.4 -0.3"
                    color="#00d4ff"
                    width="2">
            </a-text>

            <a-text
                    id="door-display"
                    value="----"
                    align="center"
                    position="0 0 -0.4"
                    width="2"
                    color="white">
            </a-text>

            <a-entity id="keypad" position="0 -0.4 -0.5">

                <!-- Frame -->
                <a-box width="1.2" height="1.6" depth="0.1" color="#cccccc"></a-box>

                <!-- Screen background -->
                <a-box position="0 -0.1 0.06" width="0.9" height="1.3" depth="0.02" color="#111"></a-box>
                <!-- Green + Red lights -->
                <a-sphere position="-0.4 0.7 0.06" radius="0.07" color="green"></a-sphere>
                <a-sphere position="-0.2 0.7 0.06" radius="0.07" color="red"></a-sphere>

                <!-- Buttons container -->
                <a-entity id="buttons" position="0 -0.1 0.08">


                    <!-- Row 1 -->
                    <a-box class="keypad-button" position="-0.3 0.3 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('1')">
                        <a-text value="1" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <a-box class="keypad-button" position="0 0.3 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('2')">
                        <a-text value="2" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <a-box class="keypad-button" position="0.3 0.3 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('3')">
                        <a-text value="3" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <!-- Row 2 -->
                    <a-box class="keypad-button" position="-0.3 0.05 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('4')">
                        <a-text value="4" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <a-box class="keypad-button" position="0 0.05 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('5')">
                        <a-text value="5" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <a-box class="keypad-button" position="0.3 0.05 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('6')">
                        <a-text value="6" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <!-- Row 3 -->
                    <a-box class="keypad-button" position="-0.3 -0.2 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('7')">
                        <a-text value="7" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <a-box class="keypad-button" position="0 -0.2 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('8')">
                        <a-text value="8" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <a-box class="keypad-button" position="0.3 -0.2 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('9')">
                        <a-text value="9" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <!-- Bottom row -->
                    <a-box class="keypad-button" position="-0.3 -0.45 0" depth="0.05" width="0.18" height="0.18"
                           color="#ccc" onclick="CodeManager.clearCode()">
                        <a-text value="*" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <a-box class="keypad-button" position="0 -0.45 0" depth="0.05" width="0.18" height="0.18"
                           color="#eee" onclick="CodeManager.addDigit('0')">
                        <a-text value="0" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                    <a-box class="keypad-button" position="0.3 -0.45 0" depth="0.05" width="0.18" height="0.18"
                           color="#ccc" onclick="CodeManager.checkCode()">
                        <a-text value="#" align="center" position="0 0 0.03" color="black"></a-text>
                    </a-box>

                </a-entity>
            </a-entity>

        </a-entity>


        <a-entity id="room-a-simulation-container"></a-entity>
        <a-entity id="room-b-simulation-container"></a-entity>


        <a-entity
                id="playerRig"
                position="0 0 0"
                movement-controls="constrainToNavMesh: true; controls: checkpoint, keyboard, touch;"
        >
            <a-camera id="camera">
                <!-- <a-cursor
                        fuse="true"
                        fuse-timeout="1000"
                        raycaster="objects: .interactable"
                        animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                        animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1"
                >
                </a-cursor> -->

                <a-entity id="hud" position="0.07 0.08 -0.25" visible="true" scale="0.8 0.8 0.8">
                    <a-text id="room1-code-display" value="Code 1 --" color="#010536" width="0.18"
                            position="0 0 0"></a-text>
                    <a-text id="room2-code-display" value="Code 2: --" color="#010536" width="0.18"
                            position="0 -0.015 0"></a-text>
                </a-entity>

                <a-entity position="-0.12 0.08 -0.35" visible="true">
                    <a-plane class="interactable" width="0.03" height="0.015" color="#1a1a1a" 
                            position="0 0 0" onclick="window.location.reload()"
                            material="depthTest: false; transparent: true; opacity: 0.8">
                        <a-text id="reset" value="Reset" align="center" width="0.15"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0.12 -0.08 -0.35">
                    <a-plane id="openHelp" class="interactable" width="0.025" height="0.025" color="#1a1a1a" 
                            position="0 0 0"
                            material="src: #question-mark; transparent: true; side: double; depthTest: false; opacity: 0.8">
                    </a-plane>
                </a-entity>
            </a-camera>

        <a-entity
          id="leftHand"
          oculus-touch-controls="hand: left"
          input-listen
          laser-controls="hand: left"
          raycaster="objects: .checkpoint, .interactable; lineColor: red; far: 10; interval:25 recursive: true"
        >
        </a-entity>
        <a-entity
          id="rightHand"
          oculus-touch-controls="hand: right"
          input-listen
          laser-controls="hand: right"
          raycaster="objects: .checkpoint, .interactable; lineColor: blue; far: 10; interval:25 recursive: true"
        >
        </a-entity>
      </a-entity>
    </a-entity>
    </a-scene>
  </body>
</html>
